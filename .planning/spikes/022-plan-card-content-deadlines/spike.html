<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spike 022 — Plan Card Content: Deadline-Centric</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  min-height: 100vh;
  padding-bottom: 160px;
}

/* ── Variant bar ── */
#variantBar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  background: #0f172a; border-bottom: 2px solid #1e293b;
  font-size: 12px; color: #94a3b8;
}
#variantBar span.lbl { font-weight: 700; margin-right: 4px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
.vbtn {
  padding: 5px 14px; border-radius: 6px; border: 1px solid #334155;
  background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s;
}
.vbtn:hover { background: #334155; color: #e2e8f0; }
.vbtn.active { background: #1a73e8; border-color: #1a73e8; color: #fff; }
.vbtn.ref { background: #475569; border-color: #475569; color: #fff; }
.sep { width: 1px; height: 20px; background: #334155; margin: 0 6px; }
.lbl2 { font-size: 11px; color: #475569; }
.sbtn {
  padding: 4px 10px; border-radius: 5px; border: 1px solid #334155;
  background: transparent; color: #64748b; cursor: pointer; font-size: 11px; transition: all 0.15s;
}
.sbtn:hover { border-color: #475569; color: #94a3b8; }
.sbtn.active { border-color: #1a73e8; color: #1a73e8; background: #0f2040; }

/* ── Layout ── */
.page-wrap { max-width: 780px; margin: 0 auto; padding: 20px 20px 0; }

/* Simple header strip mock */
.header-strip {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #e2e8f0;
}
.badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-active { background: #dcfce7; color: #166534; }
.mono { font-family: monospace; font-size: 12px; color: #64748b; font-weight: 700; }
.dot { color: #cbd5e1; }
.status-pill {
  padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  color: #fff; background: #10b981; border: none; cursor: default;
}

/* ── Card base ── */
.card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  overflow: hidden; margin-bottom: 16px;
}
.card-body { padding: 16px; }

/* ── Shared card heading style (from spike 021A) ── */
.card-heading {
  padding: 10px 16px 8px; border-bottom: 1px solid #f1f5f9;
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: #94a3b8;
}
.card-heading-old { padding: 12px 16px 10px; border-bottom: 1px solid #f1f5f9; }
.card-heading-old h3 { font-size: 14px; font-weight: 600; color: #374151; }

/* ── Progress bar (spike 021A) ── */
.progress-wrap { margin-bottom: 12px; }
.progress-track {
  width: 100%; height: 8px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin-bottom: 6px;
}
.progress-fill {
  height: 100%; border-radius: 99px; background: #1a73e8; transition: width 0.4s cubic-bezier(.4,0,.2,1);
}
.progress-fill.complete { background: #10b981; }
.progress-text { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; }
.progress-text .pct { font-weight: 700; color: #1e293b; }

/* ── Shared chips row ── */
.chips-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
  background: #f1f5f9; border: 1px solid #e2e8f0; color: #374151; font-weight: 500;
}
.chip strong { font-weight: 700; color: #1e293b; }
.chip.overdue { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
.chip.overdue strong { color: #b45309; }
.chip.complete { background: #f0fdf4; border-color: #86efac; color: #166534; }

/* ── CURRENT content styles ── */
.plan-card-stats { display: flex; gap: 24px; margin-bottom: 16px; }
.plan-card-stat-value { font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1; }
.plan-card-stat-label { font-size: 12px; color: #64748b; margin-top: 2px; }
.plan-card-highlights { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.plan-card-highlight-label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.plan-card-highlight-value { font-size: 13px; color: #374151; }
.plan-empty-box {
  padding: 14px; text-align: center; border: 1px dashed #e2e8f0;
  border-radius: 8px; margin-bottom: 14px; color: #64748b; font-size: 13px;
}
.plan-empty-box strong { color: #374151; display: block; margin-bottom: 4px; }

/* ── NEW: Deadline-centric content styles ── */

/* Section heading */
.content-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;
}

/* Overdue section */
.overdue-section {
  background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
  padding: 10px 12px; margin-bottom: 12px;
}
.overdue-section .content-section-label { color: #92400e; margin-bottom: 6px; }
.overdue-task-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 12px; color: #92400e;
}
.overdue-task-row + .overdue-task-row { border-top: 1px solid #fde68a; }
.overdue-dot { color: #ef4444; font-size: 10px; flex-shrink: 0; }
.overdue-name { flex: 1; color: #78350f; }
.overdue-age { font-size: 11px; color: #b45309; font-weight: 600; flex-shrink: 0; }
.overdue-more { font-size: 11px; color: #b45309; padding-top: 4px; }

/* Upcoming section */
.upcoming-section { margin-bottom: 14px; }
.upcoming-task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid #f8fafc;
}
.upcoming-task-row:last-child { border-bottom: none; }
.task-icon { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; }
.task-name { flex: 1; font-size: 13px; color: #1e293b; line-height: 1.3; }
.task-due {
  font-size: 11px; color: #64748b; flex-shrink: 0;
  text-align: right; line-height: 1.4;
}
.task-due .due-date { display: block; }
.task-due .due-rel { color: #94a3b8; }
.task-due .due-rel.soon { color: #f97316; font-weight: 600; }
.task-due .due-rel.very-soon { color: #ef4444; font-weight: 600; }

/* No-dates state */
.no-dates-hint {
  padding: 10px 12px; background: #f8fafc; border-radius: 8px;
  border: 1px solid #f1f5f9; margin-bottom: 14px;
  font-size: 12px; color: #94a3b8; text-align: center;
}

/* Completion state */
.completion-block {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 8px; margin-bottom: 14px;
}
.completion-icon { font-size: 20px; }
.completion-text { font-size: 13px; color: #166534; font-weight: 600; }
.completion-sub { font-size: 11px; color: #4ade80; }

/* Open Plan button row */
.footer-row {
  display: flex; align-items: center; justify-content: space-between; margin-top: 4px;
}
.footer-tasks-count { font-size: 11px; color: #94a3b8; }
.btn-primary {
  display: inline-block; padding: 8px 16px; background: #1a73e8; color: #fff;
  border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500;
}
.btn-primary:hover { background: #1557b0; }

/* Empty state */
.empty-cta { text-align: center; padding: 20px 0 10px; }
.empty-cta p { font-size: 13px; color: #94a3b8; margin-bottom: 14px; }

/* ── Info label overlay ── */
.spike-label {
  position: fixed; top: 56px; right: 16px;
  background: #0f172a; border: 1px solid #334155;
  border-radius: 8px; padding: 10px 14px;
  font-size: 11px; color: #64748b; z-index: 90; line-height: 1.8;
}
.spike-label strong { color: #e2e8f0; display: block; font-size: 12px; margin-bottom: 6px; }

/* ── Log pane ── */
#logPane {
  position: fixed; bottom: 0; left: 0; right: 0; height: 110px;
  background: #0f172a; border-top: 2px solid #1e293b;
  overflow-y: auto; padding: 8px 12px;
  font-family: monospace; font-size: 11px; z-index: 200;
}
.log-entry { display: flex; gap: 10px; padding: 2px 0; border-bottom: 1px solid #1e293b; }
.log-entry:last-child { border-bottom: none; }
.log-ts { color: #334155; flex-shrink: 0; }
.log-type { flex-shrink: 0; min-width: 60px; font-weight: 700; }
.log-type.variant { color: #60a5fa; }
.log-type.state { color: #34d399; }
.log-type.action { color: #fbbf24; }
.log-msg { color: #94a3b8; }
</style>
</head>
<body>

<!-- Variant + State bar -->
<div id="variantBar">
  <span class="lbl">Content:</span>
  <button class="vbtn ref" id="vbtn-current" onclick="setVariant('current')">Current</button>
  <button class="vbtn active" id="vbtn-new" onclick="setVariant('new')">New: Deadline-Centric</button>
  <div class="sep"></div>
  <span class="lbl2">Data state:</span>
  <button class="sbtn active" id="sbtn-typical" onclick="setState('typical')">Typical</button>
  <button class="sbtn" id="sbtn-overdue" onclick="setState('overdue')">With overdue</button>
  <button class="sbtn" id="sbtn-nodates" onclick="setState('nodates')">No dates set</button>
  <button class="sbtn" id="sbtn-done" onclick="setState('done')">All complete</button>
  <button class="sbtn" id="sbtn-empty" onclick="setState('empty')">Empty plan</button>
</div>

<div class="spike-label">
  <strong>Spike 022 — Content: Deadlines</strong>
  Current vs. Deadline-centric layout.<br>
  Visual base = Spike 021A (progress bar).
</div>

<div class="page-wrap">

  <!-- Page header mock -->
  <div class="header-strip">
    <span class="badge badge-active">✓ Active</span>
    <span class="dot">·</span>
    <span class="mono">CLMC-SPI-2026001</span>
    <span class="dot">·</span>
    <span class="status-pill">Client Approved</span>
    <span style="margin-left: auto; font-size: 12px; color: #94a3b8;">Project Plan card ↓</span>
  </div>

  <!-- Plan card mount -->
  <div id="planCardMount"></div>

  <!-- Context note -->
  <div style="font-size: 11px; color: #94a3b8; text-align: center; padding: 4px 0 20px;">
    This card appears in the bottom-right of the project detail page, below the Financial Summary.
  </div>

</div>

<div id="logPane"></div>

<script>
let variant = 'new';
let dataState = 'typical';

const DATA = {
  empty: {
    taskCount: 0, pct: 0, overdueCount: 0,
    overdueTasks: [], upcomingTasks: [],
    recentDone: null, label: 'No tasks in plan'
  },
  nodates: {
    taskCount: 6, pct: 17, overdueCount: 0,
    overdueTasks: [], upcomingTasks: [],
    recentDone: 'Initial site survey',
    label: '6 tasks, no due dates set'
  },
  typical: {
    taskCount: 8, pct: 13, overdueCount: 0,
    overdueTasks: [],
    upcomingTasks: [
      { name: 'Foundation inspection', endDate: 'Jan 20', daysUntil: 16, isMilestone: true },
      { name: 'Electrical rough-in', endDate: 'Jan 25', daysUntil: 21, isMilestone: false },
    ],
    recentDone: 'Site survey and initial assessment',
    label: '8 tasks, 2 upcoming, no overdue'
  },
  overdue: {
    taskCount: 12, pct: 42, overdueCount: 3,
    overdueTasks: [
      { name: 'Structural design sign-off', daysLate: 5 },
      { name: 'Material procurement — Phase 1', daysLate: 2 },
    ],
    overdueTotalMore: 1,
    upcomingTasks: [
      { name: 'Foundation inspection', endDate: 'Jan 20', daysUntil: 4, isMilestone: true },
    ],
    recentDone: 'Site survey and initial assessment',
    label: '12 tasks, 3 overdue, 1 upcoming'
  },
  done: {
    taskCount: 8, pct: 100, overdueCount: 0,
    overdueTasks: [], upcomingTasks: [],
    recentDone: 'Final handover documentation',
    label: 'All 8 tasks complete'
  }
};

// ── Controls ──
function setVariant(v) {
  variant = v;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active', 'ref'));
  const btn = document.getElementById('vbtn-' + v);
  btn.classList.add(v === 'current' ? 'ref' : 'active');
  render();
  addLog('variant', `Switched to ${v === 'current' ? 'Current baseline' : 'New: Deadline-Centric'}`);
}
function setState(s) {
  dataState = s;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('sbtn-' + s).classList.add('active');
  render();
  addLog('state', DATA[s].label);
}

// ── Render ──
function render() {
  const d = DATA[dataState];
  document.getElementById('planCardMount').innerHTML =
    variant === 'current' ? renderCurrent(d) : renderNew(d);
}

// ── CURRENT (faithful recreation, with 021A visual as baseline) ──
function renderCurrent(d) {
  if (d.taskCount === 0) {
    return `<div class="card">
      <div class="card-heading-old"><h3>Project Plan</h3></div>
      <div class="card-body">
        <div class="plan-card-stats">
          <div><div class="plan-card-stat-value">0</div><div class="plan-card-stat-label">tasks</div></div>
          <div><div class="plan-card-stat-value">0%</div><div class="plan-card-stat-label">complete</div></div>
        </div>
        <div class="plan-card-highlights">
          <div><div class="plan-card-highlight-label">Most recent accomplishment</div><div class="plan-card-highlight-value" style="color:#94a3b8;">No completed tasks yet.</div></div>
          <div><div class="plan-card-highlight-label">Next milestone</div><div class="plan-card-highlight-value" style="color:#94a3b8;">No upcoming milestones.</div></div>
          <div><div class="plan-card-highlight-label">Ongoing milestone</div><div class="plan-card-highlight-value" style="color:#94a3b8;">No active milestones.</div></div>
        </div>
        <div class="plan-empty-box"><strong>No tasks yet.</strong>Open the plan to get started.</div>
        <div style="text-align:right"><button class="btn-primary">Open Plan</button></div>
      </div>
    </div>`;
  }

  const recentVal = d.recentDone || 'No completed tasks yet.';
  // Current always shows milestone placeholders since test data rarely has milestones set
  const nextMilestone = 'No upcoming milestones.';
  const ongoingMilestone = 'No active milestones.';

  return `<div class="card">
    <div class="card-heading-old"><h3>Project Plan</h3></div>
    <div class="card-body">
      <div class="plan-card-stats">
        <div><div class="plan-card-stat-value">${d.taskCount}</div><div class="plan-card-stat-label">tasks</div></div>
        <div><div class="plan-card-stat-value">${d.pct}%</div><div class="plan-card-stat-label">complete</div></div>
      </div>
      <div class="plan-card-highlights">
        <div>
          <div class="plan-card-highlight-label">Most recent accomplishment</div>
          <div class="plan-card-highlight-value">${recentVal}</div>
        </div>
        <div>
          <div class="plan-card-highlight-label">Next milestone</div>
          <div class="plan-card-highlight-value" style="color:#94a3b8;">${nextMilestone}</div>
        </div>
        <div>
          <div class="plan-card-highlight-label">Ongoing milestone</div>
          <div class="plan-card-highlight-value" style="color:#94a3b8;">${ongoingMilestone}</div>
        </div>
      </div>
      <div style="text-align:right"><button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan</button></div>
    </div>
  </div>`;
}

// ── NEW: Deadline-Centric ──
function renderNew(d) {
  if (d.taskCount === 0) {
    return `<div class="card">
      <div class="card-heading">Project Plan</div>
      <div class="card-body">
        <div class="empty-cta">
          <p>No tasks yet. Open the plan to get started.</p>
          <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan →</button>
        </div>
      </div>
    </div>`;
  }

  const pct = d.pct;
  const doneCount = Math.round(d.taskCount * pct / 100);
  const complete = pct === 100;

  // Progress bar
  const progressHtml = `
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill ${complete ? 'complete' : ''}" style="width:${pct}%"></div>
      </div>
      <div class="progress-text">
        <span>${doneCount} of ${d.taskCount} tasks complete</span>
        <span class="pct">${pct}%</span>
      </div>
    </div>`;

  // All-complete state
  if (complete) {
    return `<div class="card">
      <div class="card-heading">Project Plan</div>
      <div class="card-body">
        ${progressHtml}
        <div class="completion-block">
          <div class="completion-icon">✓</div>
          <div>
            <div class="completion-text">All tasks complete</div>
            ${d.recentDone ? `<div class="completion-sub">Last: ${d.recentDone}</div>` : ''}
          </div>
        </div>
        <div class="footer-row">
          <span class="footer-tasks-count">${d.taskCount} tasks</span>
          <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan</button>
        </div>
      </div>
    </div>`;
  }

  // Overdue section
  let overdueHtml = '';
  if (d.overdueTasks && d.overdueTasks.length > 0) {
    const rows = d.overdueTasks.map(t => `
      <div class="overdue-task-row">
        <span class="overdue-dot">!</span>
        <span class="overdue-name">${t.name}</span>
        <span class="overdue-age">${t.daysLate}d late</span>
      </div>`).join('');
    const more = d.overdueTotalMore
      ? `<div class="overdue-more">+${d.overdueTotalMore} more overdue</div>` : '';
    overdueHtml = `
      <div class="overdue-section">
        <div class="content-section-label">Overdue · ${d.overdueCount}</div>
        ${rows}${more}
      </div>`;
  }

  // Upcoming section
  let upcomingHtml = '';
  if (d.upcomingTasks && d.upcomingTasks.length > 0) {
    const rows = d.upcomingTasks.map(t => {
      const relClass = t.daysUntil <= 3 ? 'very-soon' : t.daysUntil <= 7 ? 'soon' : '';
      const relText = t.daysUntil === 0 ? 'today'
                    : t.daysUntil === 1 ? 'tomorrow'
                    : `in ${t.daysUntil}d`;
      const icon = t.isMilestone ? '◆' : '○';
      return `<div class="upcoming-task-row">
        <span class="task-icon" style="color:${t.isMilestone ? '#1a73e8' : '#94a3b8'}">${icon}</span>
        <span class="task-name">${t.name}</span>
        <span class="task-due">
          <span class="due-date">${t.endDate}</span>
          <span class="due-rel ${relClass}">${relText}</span>
        </span>
      </div>`;
    }).join('');
    upcomingHtml = `
      <div class="upcoming-section">
        <div class="content-section-label">Next Up</div>
        ${rows}
      </div>`;
  } else if (d.overdueCount === 0) {
    // No upcoming tasks and no overdue — no dates set or all future tasks undated
    upcomingHtml = `<div class="no-dates-hint">Set due dates in the plan to see what's coming up.</div>`;
  }

  // Most recent accomplishment (only if populated)
  const recentHtml = d.recentDone ? `
    <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;">Last completed</div>
    <div style="font-size:12px;color:#475569;margin-bottom:14px;">${d.recentDone}</div>
  ` : '';

  return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      ${progressHtml}
      ${overdueHtml}
      ${upcomingHtml}
      ${recentHtml}
      <div class="footer-row">
        <span class="footer-tasks-count">${d.taskCount} tasks</span>
        <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan</button>
      </div>
    </div>
  </div>`;
}

// ── Log ──
function addLog(type, msg) {
  const pane = document.getElementById('logPane');
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  const row = document.createElement('div');
  row.className = 'log-entry';
  row.innerHTML = `<span class="log-ts">${ts}</span><span class="log-type ${type}">${type}</span><span class="log-msg">${msg}</span>`;
  pane.appendChild(row);
  pane.scrollTop = pane.scrollHeight;
}

render();
addLog('state', 'Loaded — spike 022. Variant: Deadline-Centric, State: Typical');
</script>
</body>
</html>
