<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spike 022 — Plan Card Content Variants</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f1f5f9; color: #1e293b;
  min-height: 100vh; padding-bottom: 160px;
}

/* ── Variant bar ── */
#variantBar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 10px 16px;
  background: #0f172a; border-bottom: 2px solid #1e293b;
  font-size: 12px; color: #94a3b8;
}
.lbl { font-weight: 700; margin-right: 2px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; font-size: 11px; }
.vbtn {
  padding: 5px 13px; border-radius: 6px; border: 1px solid #334155;
  background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s;
}
.vbtn:hover { background: #334155; color: #e2e8f0; }
.vbtn.active { background: #1a73e8; border-color: #1a73e8; color: #fff; }
.vbtn.ref { background: #475569; border-color: #475569; color: #fff; }
.sep { width: 1px; height: 20px; background: #334155; margin: 0 4px; flex-shrink: 0; }
.sbtn {
  padding: 4px 10px; border-radius: 5px; border: 1px solid #334155;
  background: transparent; color: #64748b; cursor: pointer; font-size: 11px; transition: all 0.15s;
}
.sbtn:hover { border-color: #475569; color: #94a3b8; }
.sbtn.active { border-color: #1a73e8; color: #1a73e8; background: #0f2040; }

/* ── Layout ── */
.page-wrap { max-width: 780px; margin: 0 auto; padding: 20px 20px 0; }

.header-strip {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #e2e8f0;
}
.badge-active { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #dcfce7; color: #166534; }
.mono { font-family: monospace; font-size: 12px; color: #64748b; font-weight: 700; }
.dot { color: #cbd5e1; }
.status-pill { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #fff; background: #10b981; border: none; }

/* ── Card base ── */
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }

/* ── Shared: card heading ── */
.card-heading {
  padding: 10px 16px 8px; border-bottom: 1px solid #f1f5f9;
  font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #94a3b8;
}
.card-heading-old { padding: 12px 16px 10px; border-bottom: 1px solid #f1f5f9; }
.card-heading-old h3 { font-size: 14px; font-weight: 600; color: #374151; }

/* ── Shared: progress bar (021A) ── */
.progress-wrap { margin-bottom: 14px; }
.progress-track { width: 100%; height: 8px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
.progress-fill { height: 100%; border-radius: 99px; background: #1a73e8; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.progress-fill.complete { background: #10b981; }
.progress-text { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; }
.progress-text .pct { font-weight: 700; color: #1e293b; }

/* ── Shared: footer row ── */
.footer-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.footer-count { font-size: 11px; color: #94a3b8; }
.btn-primary { padding: 8px 16px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
.btn-primary:hover { background: #1557b0; }

/* ── Shared: section label ── */
.section-lbl { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }

/* ── Shared: empty CTA ── */
.empty-cta { text-align: center; padding: 20px 0 10px; }
.empty-cta p { font-size: 13px; color: #94a3b8; margin-bottom: 14px; }

/* ── Shared: all-complete block ── */
.completion-block {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 8px; margin-bottom: 14px;
}
.completion-icon { font-size: 20px; }
.completion-text { font-size: 13px; color: #166534; font-weight: 600; }
.completion-sub { font-size: 11px; color: #4ade80; }

/* ── CURRENT: old content styles ── */
.old-stats { display: flex; gap: 24px; margin-bottom: 16px; }
.old-stat-val { font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1; }
.old-stat-lbl { font-size: 12px; color: #64748b; margin-top: 2px; }
.old-highlights { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.old-hl-lbl { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.old-hl-val { font-size: 13px; color: #374151; }
.old-empty-box { padding: 14px; text-align: center; border: 1px dashed #e2e8f0; border-radius: 8px; margin-bottom: 14px; color: #64748b; font-size: 13px; }
.old-empty-box strong { color: #374151; display: block; margin-bottom: 4px; }

/* ── A: Deadline-centric ── */
.overdue-section {
  background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
  padding: 10px 12px; margin-bottom: 12px;
}
.overdue-section .section-lbl { color: #92400e; margin-bottom: 6px; }
.overdue-task-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.overdue-task-row + .overdue-task-row { border-top: 1px solid #fde68a; }
.overdue-name { flex: 1; color: #78350f; }
.overdue-age { font-size: 11px; color: #b45309; font-weight: 600; flex-shrink: 0; }
.overdue-more { font-size: 11px; color: #b45309; padding-top: 4px; }

.upcoming-section { margin-bottom: 14px; }
.upcoming-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f8fafc; }
.upcoming-row:last-child { border-bottom: none; }
.task-icon { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; }
.task-name { flex: 1; font-size: 13px; color: #1e293b; }
.task-due { font-size: 11px; color: #64748b; flex-shrink: 0; text-align: right; line-height: 1.4; }
.task-due .due-date { display: block; }
.due-rel { color: #94a3b8; }
.due-rel.soon { color: #f97316; font-weight: 600; }
.due-rel.very-soon { color: #ef4444; font-weight: 600; }

.no-dates-hint { padding: 10px 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #f1f5f9; margin-bottom: 14px; font-size: 12px; color: #94a3b8; text-align: center; }

.last-done { margin-bottom: 14px; }
.last-done-lbl { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #94a3b8; margin-bottom: 3px; }
.last-done-val { font-size: 12px; color: #475569; }

/* ── B: Health-centric ── */
.health-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.health-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
}
.health-badge .dot-icon { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.health-badge.on-track { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
.health-badge.on-track .dot-icon { background: #22c55e; }
.health-badge.at-risk { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }
.health-badge.at-risk .dot-icon { background: #f59e0b; }
.health-badge.behind { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
.health-badge.behind .dot-icon { background: #ef4444; }

.health-metrics { display: flex; gap: 20px; flex-wrap: wrap; }
.health-metric-val { font-size: 18px; font-weight: 700; color: #1e293b; line-height: 1; }
.health-metric-lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
.health-metric-val.red { color: #ef4444; }
.health-metric-val.amber { color: #f59e0b; }

.health-next-deadline {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #f1f5f9;
  margin-bottom: 12px; font-size: 12px; color: #475569;
}
.health-next-deadline .dl-label { color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; min-width: 90px; }
.health-next-deadline .dl-name { flex: 1; }
.health-next-deadline .dl-date { color: #1e293b; font-weight: 600; font-size: 11px; }
.health-next-deadline .dl-rel { color: #94a3b8; font-size: 11px; margin-left: 4px; }
.health-next-deadline .dl-rel.soon { color: #f97316; font-weight: 600; }

/* ── C: Combined ── */
.combined-health-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.overdue-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  background: #fffbeb; border: 1px solid #fcd34d;
  font-size: 12px; font-weight: 700; color: #92400e;
}
.overdue-pill .overdue-count { font-size: 15px; }

/* ── Log pane ── */
#logPane {
  position: fixed; bottom: 0; left: 0; right: 0; height: 110px;
  background: #0f172a; border-top: 2px solid #1e293b;
  overflow-y: auto; padding: 8px 12px;
  font-family: monospace; font-size: 11px; z-index: 200;
}
.log-entry { display: flex; gap: 10px; padding: 2px 0; border-bottom: 1px solid #1e293b; color: #64748b; }
.log-entry:last-child { border-bottom: none; }
.log-ts { color: #334155; flex-shrink: 0; }
.log-type { flex-shrink: 0; min-width: 60px; font-weight: 700; }
.log-type.variant { color: #60a5fa; }
.log-type.state { color: #34d399; }
.log-type.action { color: #fbbf24; }
.log-msg { color: #94a3b8; }

/* Spike label */
.spike-label {
  position: fixed; top: 56px; right: 16px;
  background: #0f172a; border: 1px solid #334155; border-radius: 8px;
  padding: 10px 14px; font-size: 11px; color: #64748b; z-index: 90; line-height: 1.8;
}
.spike-label strong { color: #e2e8f0; display: block; font-size: 12px; margin-bottom: 6px; }
</style>
</head>
<body>

<div id="variantBar">
  <span class="lbl">Variant:</span>
  <button class="vbtn ref" id="vbtn-current" onclick="setVariant('current')">Current</button>
  <button class="vbtn active" id="vbtn-a" onclick="setVariant('a')">A: Deadlines</button>
  <button class="vbtn" id="vbtn-b" onclick="setVariant('b')">B: Health</button>
  <button class="vbtn" id="vbtn-c" onclick="setVariant('c')">C: Combined</button>
  <div class="sep"></div>
  <span class="lbl">Data:</span>
  <button class="sbtn active" id="sbtn-typical" onclick="setState('typical')">Typical</button>
  <button class="sbtn" id="sbtn-overdue" onclick="setState('overdue')">With overdue</button>
  <button class="sbtn" id="sbtn-nodates" onclick="setState('nodates')">No dates</button>
  <button class="sbtn" id="sbtn-done" onclick="setState('done')">All done</button>
  <button class="sbtn" id="sbtn-empty" onclick="setState('empty')">Empty</button>
</div>

<div class="spike-label">
  <strong>Spike 022 — Content Options</strong>
  A: Deadlines · B: Health · C: Combined<br>
  Base visual = Spike 021A (progress bar).
</div>

<div class="page-wrap">
  <div class="header-strip">
    <span class="badge-active">✓ Active</span>
    <span class="dot">·</span>
    <span class="mono">CLMC-SPI-2026001</span>
    <span class="dot">·</span>
    <span class="status-pill">Client Approved</span>
    <span style="margin-left:auto;font-size:12px;color:#94a3b8;">Project Plan card (right column, below Financial Summary)</span>
  </div>

  <div id="planCardMount"></div>

  <div style="font-size:11px;color:#94a3b8;text-align:center;padding:4px 0 20px;">
    Switch between Current / A / B / C and all data states to compare.
  </div>
</div>

<div id="logPane"></div>

<script>
let variant = 'a';
let dataState = 'typical';

const DATA = {
  empty:   { taskCount:0,  pct:0,   overdue:0, overdueTasks:[],                       upcomingTasks:[],                                                                               recentDone:null,                               health:'on-track', nextDeadline:null, label:'Empty plan' },
  nodates: { taskCount:6,  pct:17,  overdue:0, overdueTasks:[],                       upcomingTasks:[],                                                                               recentDone:'Initial site survey',              health:'on-track', nextDeadline:null, label:'6 tasks, no due dates set' },
  typical: { taskCount:8,  pct:13,  overdue:0, overdueTasks:[],
             upcomingTasks:[{name:'Foundation inspection',date:'Jan 20',daysUntil:16,isMilestone:true},{name:'Electrical rough-in',date:'Jan 25',daysUntil:21,isMilestone:false}],
             recentDone:'Site survey and initial assessment',                           health:'on-track', nextDeadline:{name:'Foundation inspection',date:'Jan 20',daysUntil:16,isMilestone:true}, label:'8 tasks, 2 upcoming, no overdue' },
  overdue: { taskCount:12, pct:42,  overdue:3,
             overdueTasks:[{name:'Structural design sign-off',daysLate:5},{name:'Material procurement — Phase 1',daysLate:2}], overdueMore:1,
             upcomingTasks:[{name:'Foundation inspection',date:'Jan 20',daysUntil:4,isMilestone:true}],
             recentDone:'Site survey and initial assessment',                           health:'behind',   nextDeadline:{name:'Foundation inspection',date:'Jan 20',daysUntil:4,isMilestone:true}, label:'12 tasks, 3 overdue, 1 upcoming' },
  done:    { taskCount:8,  pct:100, overdue:0, overdueTasks:[],                       upcomingTasks:[],                                                                               recentDone:'Final handover documentation',     health:'on-track', nextDeadline:null, label:'All 8 tasks complete' },
};

// ── Controls ──
function setVariant(v) {
  variant = v;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active','ref'));
  document.getElementById('vbtn-'+v).classList.add(v==='current'?'ref':'active');
  render();
  const names={current:'Current (baseline)',a:'A: Deadline-Centric',b:'B: Health-Centric',c:'C: Combined (A+B)'};
  addLog('variant', names[v]);
}
function setState(s) {
  dataState = s;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('sbtn-'+s).classList.add('active');
  render();
  addLog('state', DATA[s].label);
}

// ── Shared helpers ──
function progressBar(d) {
  const doneCount = Math.round(d.taskCount * d.pct / 100);
  const complete = d.pct === 100;
  return `<div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill ${complete?'complete':''}" style="width:${d.pct}%"></div>
    </div>
    <div class="progress-text">
      <span>${doneCount} of ${d.taskCount} tasks complete</span>
      <span class="pct">${d.pct}%</span>
    </div>
  </div>`;
}

function completionBlock(d) {
  return `<div class="completion-block">
    <div class="completion-icon">✓</div>
    <div>
      <div class="completion-text">All tasks complete</div>
      ${d.recentDone?`<div class="completion-sub">Last: ${d.recentDone}</div>`:''}
    </div>
  </div>`;
}

function footerRow(d) {
  return `<div class="footer-row">
    <span class="footer-count">${d.taskCount} tasks</span>
    <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan</button>
  </div>`;
}

function lastDoneBlock(d) {
  if (!d.recentDone) return '';
  return `<div class="last-done">
    <div class="last-done-lbl">Last completed</div>
    <div class="last-done-val">${d.recentDone}</div>
  </div>`;
}

function overdueSection(d) {
  if (!d.overdueTasks || d.overdueTasks.length === 0) return '';
  const rows = d.overdueTasks.map(t => `
    <div class="overdue-task-row">
      <span style="color:#ef4444;font-size:10px;">!</span>
      <span class="overdue-name">${t.name}</span>
      <span class="overdue-age">${t.daysLate}d late</span>
    </div>`).join('');
  const more = d.overdueMore ? `<div class="overdue-more">+${d.overdueMore} more</div>` : '';
  return `<div class="overdue-section">
    <div class="section-lbl">Overdue · ${d.overdue}</div>
    ${rows}${more}
  </div>`;
}

function upcomingSection(d, forCombined=false) {
  if (d.upcomingTasks && d.upcomingTasks.length > 0) {
    const rows = d.upcomingTasks.map(t => {
      const rc = t.daysUntil <= 3 ? 'very-soon' : t.daysUntil <= 7 ? 'soon' : '';
      const rel = t.daysUntil === 0 ? 'today' : t.daysUntil === 1 ? 'tomorrow' : `in ${t.daysUntil}d`;
      return `<div class="upcoming-row">
        <span class="task-icon" style="color:${t.isMilestone?'#1a73e8':'#94a3b8'}">${t.isMilestone?'◆':'○'}</span>
        <span class="task-name">${t.name}</span>
        <span class="task-due">
          <span class="due-date">${t.date}</span>
          <span class="due-rel ${rc}">${rel}</span>
        </span>
      </div>`;
    }).join('');
    return `<div class="upcoming-section"><div class="section-lbl">Next Up</div>${rows}</div>`;
  }
  // No upcoming + no overdue = no dates hint
  if (d.overdue === 0 && !forCombined) {
    return `<div class="no-dates-hint">Set due dates in the plan to see what's coming up.</div>`;
  }
  return forCombined && d.overdue === 0
    ? `<div class="no-dates-hint">Set due dates in the plan to see what's coming up.</div>`
    : '';
}

// ── CURRENT ──
function renderCurrent(d) {
  if (d.taskCount === 0) return `<div class="card">
    <div class="card-heading-old"><h3>Project Plan</h3></div>
    <div class="card-body">
      <div class="old-stats">
        <div><div class="old-stat-val">0</div><div class="old-stat-lbl">tasks</div></div>
        <div><div class="old-stat-val">0%</div><div class="old-stat-lbl">complete</div></div>
      </div>
      <div class="old-highlights">
        <div><div class="old-hl-lbl">Most recent accomplishment</div><div class="old-hl-val" style="color:#94a3b8">No completed tasks yet.</div></div>
        <div><div class="old-hl-lbl">Next milestone</div><div class="old-hl-val" style="color:#94a3b8">No upcoming milestones.</div></div>
        <div><div class="old-hl-lbl">Ongoing milestone</div><div class="old-hl-val" style="color:#94a3b8">No active milestones.</div></div>
      </div>
      <div class="old-empty-box"><strong>No tasks yet.</strong>Open the plan to get started.</div>
      <div style="text-align:right"><button class="btn-primary">Open Plan</button></div>
    </div>
  </div>`;

  const recent = d.recentDone || 'No completed tasks yet.';
  return `<div class="card">
    <div class="card-heading-old"><h3>Project Plan</h3></div>
    <div class="card-body">
      <div class="old-stats">
        <div><div class="old-stat-val">${d.taskCount}</div><div class="old-stat-lbl">tasks</div></div>
        <div><div class="old-stat-val">${d.pct}%</div><div class="old-stat-lbl">complete</div></div>
      </div>
      <div class="old-highlights">
        <div><div class="old-hl-lbl">Most recent accomplishment</div><div class="old-hl-val">${recent}</div></div>
        <div><div class="old-hl-lbl">Next milestone</div><div class="old-hl-val" style="color:#94a3b8">No upcoming milestones.</div></div>
        <div><div class="old-hl-lbl">Ongoing milestone</div><div class="old-hl-val" style="color:#94a3b8">No active milestones.</div></div>
      </div>
      <div style="text-align:right"><button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan</button></div>
    </div>
  </div>`;
}

// ── VARIANT A: Deadline-Centric ──
function renderA(d) {
  if (d.taskCount === 0) return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      <div class="empty-cta"><p>No tasks yet. Open the plan to get started.</p>
      <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan →</button></div>
    </div>
  </div>`;

  if (d.pct === 100) return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">${progressBar(d)}${completionBlock(d)}${footerRow(d)}</div>
  </div>`;

  return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      ${progressBar(d)}
      ${overdueSection(d)}
      ${upcomingSection(d)}
      ${lastDoneBlock(d)}
      ${footerRow(d)}
    </div>
  </div>`;
}

// ── VARIANT B: Health-Centric ──
function renderB(d) {
  if (d.taskCount === 0) return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      <div class="empty-cta"><p>No tasks yet. Open the plan to get started.</p>
      <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan →</button></div>
    </div>
  </div>`;

  if (d.pct === 100) return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">${progressBar(d)}${completionBlock(d)}${footerRow(d)}</div>
  </div>`;

  // Health badge
  const healthMeta = {
    'on-track': { label:'On Track', cls:'on-track' },
    'at-risk':  { label:'At Risk',  cls:'at-risk'  },
    'behind':   { label:'Behind',   cls:'behind'   },
  };
  const hm = healthMeta[d.health] || healthMeta['on-track'];
  const healthBadge = `<span class="health-badge ${hm.cls}">
    <span class="dot-icon"></span>${hm.label}
  </span>`;

  // Overdue metric (shown only if > 0)
  const overdueMetric = d.overdue > 0
    ? `<div>
        <div class="health-metric-val ${d.overdue>=3?'red':'amber'}">${d.overdue}</div>
        <div class="health-metric-lbl">overdue</div>
      </div>`
    : '';

  const healthRow = `<div class="health-row">
    ${healthBadge}
    <div class="health-metrics">
      ${overdueMetric}
    </div>
  </div>`;

  // Next deadline row
  let nextDeadlineHtml = '';
  if (d.nextDeadline) {
    const nd = d.nextDeadline;
    const rc = nd.daysUntil <= 3 ? 'soon' : '';
    const rel = nd.daysUntil === 0 ? 'today' : nd.daysUntil === 1 ? 'tomorrow' : `in ${nd.daysUntil}d`;
    const icon = nd.isMilestone ? '◆' : '○';
    nextDeadlineHtml = `<div class="health-next-deadline">
      <span class="dl-label">Next deadline</span>
      <span class="dl-name">${icon} ${nd.name}</span>
      <span class="dl-date">${nd.date}</span>
      <span class="dl-rel ${rc}">${rel}</span>
    </div>`;
  } else if (d.overdue === 0) {
    nextDeadlineHtml = `<div class="no-dates-hint">Set due dates in the plan to track schedule health.</div>`;
  }

  return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      ${progressBar(d)}
      ${healthRow}
      ${nextDeadlineHtml}
      ${lastDoneBlock(d)}
      ${footerRow(d)}
    </div>
  </div>`;
}

// ── VARIANT C: Combined (Health badge + Deadline rows) ──
function renderC(d) {
  if (d.taskCount === 0) return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      <div class="empty-cta"><p>No tasks yet. Open the plan to get started.</p>
      <button class="btn-primary" onclick="addLog('action','Open Plan clicked')">Open Plan →</button></div>
    </div>
  </div>`;

  if (d.pct === 100) return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">${progressBar(d)}${completionBlock(d)}${footerRow(d)}</div>
  </div>`;

  const healthMeta = {
    'on-track': { label:'On Track', cls:'on-track' },
    'at-risk':  { label:'At Risk',  cls:'at-risk'  },
    'behind':   { label:'Behind',   cls:'behind'   },
  };
  const hm = healthMeta[d.health] || healthMeta['on-track'];

  const overdueChip = d.overdue > 0
    ? `<span class="overdue-pill">
        <span class="overdue-count">${d.overdue}</span> overdue
      </span>`
    : '';

  const topRow = `<div class="combined-health-row">
    <span class="health-badge ${hm.cls}">
      <span class="dot-icon"></span>${hm.label}
    </span>
    ${overdueChip}
  </div>`;

  // Overdue task details (collapsed to 1 line when combined)
  let overdueDetail = '';
  if (d.overdueTasks && d.overdueTasks.length > 0) {
    const rows = d.overdueTasks.map(t => `
      <div class="overdue-task-row">
        <span style="color:#ef4444;font-size:10px;">!</span>
        <span class="overdue-name">${t.name}</span>
        <span class="overdue-age">${t.daysLate}d late</span>
      </div>`).join('');
    const more = d.overdueMore ? `<div class="overdue-more">+${d.overdueMore} more</div>` : '';
    overdueDetail = `<div class="overdue-section" style="margin-bottom:12px;">${rows}${more}</div>`;
  }

  return `<div class="card">
    <div class="card-heading">Project Plan</div>
    <div class="card-body">
      ${progressBar(d)}
      ${topRow}
      ${overdueDetail}
      ${upcomingSection(d, true)}
      ${lastDoneBlock(d)}
      ${footerRow(d)}
    </div>
  </div>`;
}

// ── Render dispatcher ──
function render() {
  const d = DATA[dataState];
  const html = variant==='current' ? renderCurrent(d)
             : variant==='a'       ? renderA(d)
             : variant==='b'       ? renderB(d)
             :                       renderC(d);
  document.getElementById('planCardMount').innerHTML = html;
}

// ── Log ──
function addLog(type, msg) {
  const pane = document.getElementById('logPane');
  const ts = new Date().toLocaleTimeString('en-US',{hour12:false});
  const row = document.createElement('div');
  row.className = 'log-entry';
  row.innerHTML = `<span class="log-ts">${ts}</span><span class="log-type ${type}">${type}</span><span class="log-msg">${msg}</span>`;
  pane.appendChild(row);
  pane.scrollTop = pane.scrollHeight;
}

render();
addLog('state','Loaded — spike 022 v2. Four content variants. Default: A Deadline-Centric, Typical state.');
</script>
</body>
</html>
