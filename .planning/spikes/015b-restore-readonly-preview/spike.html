<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spike 015b — Restore: Read-only Preview</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --success: #059669;
    --warning: #f59e0b;
    --warning-bg: #fef3c7;
    --warning-border: #fcd34d;
    --danger: #ef4444;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid var(--border);
  }
  .topbar h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .topbar .meta { color: var(--muted); font-size: 12px; }
  .preview-banner {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 10px 20px;
    background: var(--warning-bg);
    border-bottom: 2px solid var(--warning-border);
    color: #78350f;
    font-size: 13px;
  }
  .preview-banner.show { display: flex; }
  .preview-banner .icon {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--warning);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }
  .preview-banner strong { color: #78350f; font-weight: 600; }
  .preview-banner .spacer { flex: 1; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 51px);
  }
  body.previewing .layout { height: calc(100vh - 51px - 47px); }
  .main { overflow: auto; padding: 20px; }
  .sidebar {
    background: #fff;
    border-left: 1px solid var(--border);
    overflow: auto;
    padding: 16px;
  }
  .sidebar h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .task-table {
    width: 100%;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    border-collapse: separate;
    border-spacing: 0;
    transition: opacity 0.2s, filter 0.2s;
  }
  body.previewing .task-table {
    border-color: var(--warning-border);
    box-shadow: 0 0 0 3px rgba(252, 211, 77, 0.15);
  }
  .task-table th, .task-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    font-size: 13px;
  }
  .task-table th {
    background: #f8fafc;
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  body.previewing .task-table th { background: #fef9c3; }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table td.editable {
    cursor: text;
    border-radius: 4px;
  }
  .task-table td.editable:hover {
    background: #f1f5f9;
    outline: 1px dashed var(--primary);
    outline-offset: -1px;
  }
  body.previewing .task-table td.editable {
    cursor: not-allowed;
    user-select: none;
  }
  body.previewing .task-table td.editable:hover {
    background: transparent;
    outline: none;
  }
  body.previewing .task-table tbody {
    color: #475569;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-overdue { background: #fee2e2; color: var(--danger); }
  .badge-ontrack { background: #dbeafe; color: var(--primary); }
  .badge-done    { background: #d1fae5; color: var(--success); }
  .iteration-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    background: #fff;
    transition: border-color 0.15s;
  }
  .iteration-card:hover { border-color: var(--primary); }
  .iteration-card.previewing {
    border-color: var(--warning);
    background: var(--warning-bg);
  }
  .iteration-card .name { font-weight: 600; font-size: 14px; }
  .iteration-card .meta { color: var(--muted); font-size: 12px; margin: 4px 0 10px 0; }
  .iteration-card .actions { display: flex; gap: 8px; }
  .btn {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
  .btn-warning { background: var(--warning); color: #fff; border-color: var(--warning); }
  .btn-warning:hover { background: #d97706; border-color: #d97706; }
  .live-tag {
    display: inline-block;
    background: #d1fae5;
    color: var(--success);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    font-weight: 600;
  }
  .log-panel {
    margin-top: 20px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .log-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 0 0 8px 0;
  }
  .log-line { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--muted); padding: 2px 0; }
  .log-line.event-preview-enter { color: var(--warning); }
  .log-line.event-preview-exit  { color: var(--success); }
</style>
</head>
<body>

<div class="topbar">
  <h1>Project Plan — Tower B Construction</h1>
  <span class="meta">Spike 015b · Read-only Preview</span>
  <span class="live-tag" id="liveTag">LIVE</span>
</div>

<div class="preview-banner" id="previewBanner">
  <div class="icon">P</div>
  <div>
    <strong>Viewing</strong> <span id="previewName">Iteration X</span>
    — read-only. Your live plan is unchanged.
  </div>
  <div class="spacer"></div>
  <button class="btn btn-warning" id="exitPreviewBtn">Exit Preview</button>
</div>

<div class="layout">
  <div class="main">
    <table class="task-table" id="taskTable">
      <thead>
        <tr>
          <th style="width:50%">Task</th>
          <th>Start</th>
          <th>End</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="taskBody"></tbody>
    </table>

    <div class="log-panel">
      <h3>Event log</h3>
      <div id="logLines"></div>
    </div>
  </div>

  <div class="sidebar">
    <h2>Saved Iterations</h2>
    <div id="iterationList"></div>
  </div>
</div>

<script>
const LIVE_PLAN = [
  { id: 't1', name: 'Mobilization & site setup',      start: '2026-06-01', end: '2026-06-07', status: 'done' },
  { id: 't2', name: 'Excavation & dewatering',        start: '2026-06-08', end: '2026-06-20', status: 'ontrack' },
  { id: 't3', name: 'Foundation pour (slab + columns)', start: '2026-06-21', end: '2026-07-10', status: 'overdue' },
  { id: 't4', name: 'Structural steel — floors 1-5',  start: '2026-07-11', end: '2026-08-15', status: 'ontrack' },
  { id: 't5', name: 'MEP rough-in — floors 1-3',      start: '2026-08-01', end: '2026-09-10', status: 'ontrack' }
];

const ITERATIONS = [
  {
    id: 'it1',
    name: 'Pre-scope-change (May 12)',
    saved: '2026-05-12',
    note: 'Before client added basement parking',
    tasks: [
      { id: 't1', name: 'Mobilization & site setup',          start: '2026-05-15', end: '2026-05-21', status: 'ontrack' },
      { id: 't2', name: 'Excavation (no basement)',           start: '2026-05-22', end: '2026-05-30', status: 'ontrack' },
      { id: 't3', name: 'Foundation pour (slab only)',        start: '2026-05-31', end: '2026-06-12', status: 'ontrack' },
      { id: 't4', name: 'Structural steel — floors 1-5',      start: '2026-06-13', end: '2026-07-18', status: 'ontrack' }
    ]
  },
  {
    id: 'it2',
    name: 'Q3 plan freeze',
    saved: '2026-05-20',
    note: 'Approved by PM before mobilization',
    tasks: [
      { id: 't1', name: 'Mobilization & site setup',          start: '2026-06-01', end: '2026-06-07', status: 'ontrack' },
      { id: 't2', name: 'Excavation & dewatering',            start: '2026-06-08', end: '2026-06-18', status: 'ontrack' },
      { id: 't3', name: 'Foundation pour (slab + columns)',   start: '2026-06-19', end: '2026-07-08', status: 'ontrack' },
      { id: 't4', name: 'Structural steel — floors 1-5',      start: '2026-07-09', end: '2026-08-12', status: 'ontrack' },
      { id: 't5', name: 'MEP rough-in — floors 1-3',          start: '2026-07-25', end: '2026-09-05', status: 'ontrack' }
    ]
  },
  {
    id: 'it3',
    name: 'Conservative re-plan',
    saved: '2026-05-29',
    note: '+2 weeks on foundation per geotech report',
    tasks: [
      { id: 't1', name: 'Mobilization & site setup',          start: '2026-06-01', end: '2026-06-07', status: 'done' },
      { id: 't2', name: 'Excavation & dewatering',            start: '2026-06-08', end: '2026-06-22', status: 'ontrack' },
      { id: 't3', name: 'Foundation pour (incl. piles)',      start: '2026-06-23', end: '2026-07-24', status: 'ontrack' },
      { id: 't4', name: 'Structural steel — floors 1-5',      start: '2026-07-25', end: '2026-08-29', status: 'ontrack' },
      { id: 't5', name: 'MEP rough-in — floors 1-3',          start: '2026-08-15', end: '2026-09-25', status: 'ontrack' }
    ]
  }
];

let previewingId = null;
const log = [];

function visibleTasks() {
  if (previewingId) return ITERATIONS.find(x => x.id === previewingId).tasks;
  return LIVE_PLAN;
}

function renderTasks() {
  const body = document.getElementById('taskBody');
  body.innerHTML = visibleTasks().map(t => {
    const statusLabel = t.status === 'done' ? 'Done' : t.status === 'overdue' ? 'Overdue' : 'On track';
    const statusClass = 'badge-' + t.status;
    return `<tr>
      <td class="editable">${t.name}</td>
      <td class="editable">${t.start}</td>
      <td class="editable">${t.end}</td>
      <td><span class="badge ${statusClass}">${statusLabel}</span></td>
    </tr>`;
  }).join('');
}

function renderIterations() {
  const list = document.getElementById('iterationList');
  list.innerHTML = ITERATIONS.map(it => {
    const isActive = previewingId === it.id;
    return `<div class="iteration-card ${isActive ? 'previewing' : ''}">
      <div class="name">${it.name}</div>
      <div class="meta">Saved ${it.saved} · ${it.tasks.length} tasks<br>${it.note}</div>
      <div class="actions">
        <button class="btn btn-warning" onclick="enterPreview('${it.id}')" ${isActive ? 'disabled' : ''}>
          ${isActive ? 'Previewing…' : 'Preview'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function pushLog(msg, category) {
  const time = new Date().toLocaleTimeString();
  log.push({ time, msg, category });
  const lines = document.getElementById('logLines');
  lines.innerHTML = log.slice().reverse().map(l =>
    `<div class="log-line event-${l.category}">[${l.time}] ${l.msg}</div>`
  ).join('');
}

function enterPreview(itId) {
  const it = ITERATIONS.find(x => x.id === itId);
  if (!it) return;
  previewingId = itId;
  document.body.classList.add('previewing');
  document.getElementById('previewBanner').classList.add('show');
  document.getElementById('previewName').textContent = '"' + it.name + '"';
  document.getElementById('liveTag').style.display = 'none';
  renderTasks();
  renderIterations();
  pushLog('PREVIEW ENTER → ' + it.name + ' (live untouched)', 'preview-enter');
}

function exitPreview() {
  if (!previewingId) return;
  const itName = ITERATIONS.find(x => x.id === previewingId).name;
  previewingId = null;
  document.body.classList.remove('previewing');
  document.getElementById('previewBanner').classList.remove('show');
  document.getElementById('liveTag').style.display = 'inline-block';
  renderTasks();
  renderIterations();
  pushLog('PREVIEW EXIT ← back to live plan (was viewing ' + itName + ')', 'preview-exit');
}

document.getElementById('exitPreviewBtn').onclick = exitPreview;

renderTasks();
renderIterations();
pushLog('Spike loaded — 5 live tasks, 3 saved iterations. Click Preview to view any iteration.', 'event');

// Demo: clicking editable cells while previewing → ignored silently
document.getElementById('taskBody').addEventListener('click', (e) => {
  if (previewingId && e.target.classList.contains('editable')) {
    pushLog('Edit attempt blocked — preview mode is read-only', 'event');
  }
});
</script>

</body>
</html>
