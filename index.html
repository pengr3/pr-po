<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLMC Procurement System</title>
    <link rel="icon" href="data:,">

    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/views.css">
    <link rel="stylesheet" href="styles/hero.css">

    <!-- Signature capture library (self-hosted to avoid CDN tracking-prevention warnings) -->
    <script src="lib/signature_pad.umd.min.js"></script>
    <!-- Chart.js (Phase 77.1) — pinned to v4.4.7 for home page status breakdown charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Top Navigation (hidden until auth state known - SEC-01) -->
    <nav class="top-nav" style="display: none;">
        <div class="top-nav-content">
            <a href="#/" class="nav-brand">
                <img src="https://raw.githubusercontent.com/pengr3/pr-po/main/CLMC%20Registered%20Logo.png"
                     alt="CLMC Logo"
                     onerror="this.style.display='none'">
                CLMC Operations
            </a>
            <button class="nav-hamburger-btn" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="Open navigation menu" aria-expanded="false">
                <span class="hamburger-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </button>
            <div class="nav-links">
                <a href="#/" class="nav-link" data-route="dashboard">Home</a>
                <a href="#/clients" class="nav-link" data-route="clients">Clients</a>
                <a href="#/projects" class="nav-link" data-route="projects">Projects</a>
                <a href="#/services" class="nav-link" data-route="services">Services</a>
                <a href="#/mrf-form" class="nav-link" data-route="mrf_form">Material Request</a>
                <a href="#/procurement" class="nav-link" data-route="procurement">Procurement</a>
                <a href="#/finance" class="nav-link" data-route="finance">Finance</a>
                <div class="nav-dropdown" data-route="role_config">
                    <button class="nav-link nav-dropdown-trigger" data-route="role_config" onclick="toggleAdminDropdown(event)">Admin</button>
                    <div class="nav-dropdown-menu" id="adminDropdownMenu">
                        <a href="#/admin" class="nav-dropdown-item" onclick="setAdminSection('users')">User Management</a>
                        <a href="#/admin" class="nav-dropdown-item" onclick="setAdminSection('assignments')">Assignments</a>
                        <a href="#/admin" class="nav-dropdown-item" onclick="setAdminSection('settings')">Settings</a>
                    </div>
                </div>
                <button id="logoutBtn" class="nav-logout-btn" onclick="handleLogout()" style="display: none;">
                    Log Out
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Menu -->
    <div class="mobile-nav-backdrop" id="mobileNavBackdrop" onclick="closeMobileMenu()"></div>
    <div class="mobile-nav-menu" id="mobileNavMenu" role="dialog" aria-label="Navigation menu">
        <nav class="mobile-nav-items">
            <a href="#/" class="mobile-nav-item" data-route="dashboard" onclick="mobileNavClick(event, this)">Home</a>
            <a href="#/clients" class="mobile-nav-item" data-route="clients" onclick="mobileNavClick(event, this)">Clients</a>
            <a href="#/projects" class="mobile-nav-item" data-route="projects" onclick="mobileNavClick(event, this)">Projects</a>
            <a href="#/services" class="mobile-nav-item" data-route="services" onclick="mobileNavClick(event, this)">Services</a>
            <a href="#/mrf-form" class="mobile-nav-item" data-route="mrf_form" onclick="mobileNavClick(event, this)">Material Request</a>
            <a href="#/procurement" class="mobile-nav-item" data-route="procurement" onclick="mobileNavClick(event, this)">Procurement</a>
            <a href="#/finance" class="mobile-nav-item" data-route="finance" onclick="mobileNavClick(event, this)">Finance</a>
            <a href="#/admin" class="mobile-nav-item" data-route="role_config" onclick="mobileNavClick(event, this)">Admin</a>
        </nav>
        <div class="mobile-nav-footer">
            <hr class="mobile-nav-divider">
            <span class="mobile-nav-username" id="mobileNavUsername"></span>
            <button class="mobile-nav-logout" onclick="closeMobileMenu(); handleLogout();">Log Out</button>
        </div>
    </div>

    <!-- Main Application Container -->
    <div id="app-container">
        <!-- Views will be loaded here dynamically -->
        <div style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading application...</p>
            </div>
        </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Global Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Admin Dropdown + Mobile Hamburger Navigation -->
    <script>
        // Admin dropdown toggle
        window.toggleAdminDropdown = function(event) {
            event.stopPropagation();
            var menu = document.getElementById('adminDropdownMenu');
            menu.classList.toggle('open');
        };

        // Set admin section before navigation
        window.setAdminSection = function(section) {
            // Store desired section so admin.js can read it on init
            window._pendingAdminSection = section;
            var menu = document.getElementById('adminDropdownMenu');
            if (menu) menu.classList.remove('open');

            // If already on admin route, switch section directly
            if (window.location.hash === '#/admin' || window.location.hash.indexOf('#/admin/') === 0) {
                if (window.switchAdminSection) {
                    window.switchAdminSection(section);
                }
            }
            // Otherwise, navigation happens via href="#/admin"
        };

        // Close dropdown on outside click
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.nav-dropdown')) {
                var menu = document.getElementById('adminDropdownMenu');
                if (menu) menu.classList.remove('open');
            }
        });

        // ---- Mobile hamburger menu ----

        var _mobileMenuOpen = false;

        window.toggleMobileMenu = function() {
            if (_mobileMenuOpen) {
                closeMobileMenu();
            } else {
                openMobileMenu();
            }
        };

        function openMobileMenu() {
            _mobileMenuOpen = true;
            var menu = document.getElementById('mobileNavMenu');
            var backdrop = document.getElementById('mobileNavBackdrop');
            var btn = document.getElementById('hamburgerBtn');
            if (menu) menu.classList.add('is-open');
            if (backdrop) backdrop.classList.add('is-open');
            if (btn) { btn.classList.add('is-open'); btn.setAttribute('aria-expanded', 'true'); }
            document.body.style.overflow = 'hidden'; // lock scroll
        }

        window.closeMobileMenu = function() {
            _mobileMenuOpen = false;
            var menu = document.getElementById('mobileNavMenu');
            var backdrop = document.getElementById('mobileNavBackdrop');
            var btn = document.getElementById('hamburgerBtn');
            if (menu) menu.classList.remove('is-open');
            if (backdrop) backdrop.classList.remove('is-open');
            if (btn) { btn.classList.remove('is-open'); btn.setAttribute('aria-expanded', 'false'); }
            document.body.style.overflow = ''; // restore scroll
        };

        // Close mobile menu when viewport widens to desktop (>=768px)
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 768 && _mobileMenuOpen) {
                closeMobileMenu();
            }
        });

        // Close both admin dropdown and mobile menu on navigation (consolidated hashchange handler)
        window.addEventListener('hashchange', function() {
            // Close admin dropdown
            var adminMenu = document.getElementById('adminDropdownMenu');
            if (adminMenu) adminMenu.classList.remove('open');
            // Close mobile menu
            if (_mobileMenuOpen) closeMobileMenu();
        });

        // Handle mobile nav item tap — navigate and close menu
        window.mobileNavClick = function(event, el) {
            // Navigation happens via href; just close the menu
            closeMobileMenu();
        };
    </script>

    <!-- Load Firebase and Initialize App -->
    <script type="module">
        // Import Firebase service (initializes Firebase)
        import './app/firebase.js';

        // Import and initialize auth observer
        import { initAuthObserver } from './app/auth.js';

        // Import and initialize router
        import { initRouter } from './app/router.js';

        // Import utilities to make them available globally
        import './app/utils.js';

        // Import components to make them available globally
        import './app/components.js';

        // Initialize auth and router when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                initAuthObserver();
                initRouter();
            });
        } else {
            initAuthObserver();
            initRouter();
        }
    </script>
</body>
</html>
